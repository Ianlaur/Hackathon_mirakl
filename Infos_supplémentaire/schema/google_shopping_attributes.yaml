# Google Shopping — Product feed attributes
# -----------------------------------------------------------------------------
# Attributes supported by the Google Shopping product feed.
# Unlike Amazon, Google Shopping uses a flat attribute structure: the same
# schema applies to all product categories. Some attributes become required
# only for specific verticals (apparel, beds, mattresses), but for the
# Nordika furniture catalog the set defined here is sufficient.
# -----------------------------------------------------------------------------

version: 1
marketplace: google_shopping

feed_metadata:
  feed_locale:
    requirement: required
    type: enum
    description: >
      The language and country the feed targets. Determines which locale the
      localized attributes (title, description, color, material, product_type)
      must be expressed in.
    values:
      fr_FR: { country: FR, language: fr, currency: EUR }
      it_IT: { country: IT, language: it, currency: EUR }
      de_DE: { country: DE, language: de, currency: EUR }
      
# -----------------------------------------------------------------------------
# SEMANTICS OF `localized: true`
# When an attribute is flagged `localized: true`, its value MUST be expressed
# in the language declared by feed_locale.
# Example: for feed_locale = fr_FR, `title` must be in French, `color` must
# be "Crème" not "Cream", `google_product_category` must use the French
# category path (or the numeric ID, which is language-agnostic).
# -----------------------------------------------------------------------------

attributes:

  id:
    requirement: required
    type: string
    max_length: 50
    description: >
      Unique product identifier within the feed. Typically the seller's SKU.
      Must stay stable over time for the same product.

  title:
    requirement: required
    type: string
    min_length: 1
    max_length: 150
    localized: true
    description: >
      Product title as displayed in search results and shopping ads.
      Must be in the feed's language. Avoid ALL CAPS and promotional
      characters (!, ★, FREE). Include key differentiators (material, color,
      size) when relevant.

  description:
    requirement: required
    type: string
    min_length: 1
    max_length: 5000
    localized: true
    description: >
      Long-form product description. Plain text only (HTML stripped by Google).
      Must be in the feed's language.

  link:
    requirement: optional
    type: string
    format: url_https
    description: >
      HTTPS URL of the product page on the seller's site. Not present in the
      Nordika source catalog — may be omitted for the hackathon.

  image_link:
    requirement: optional
    type: string
    format: url_https
    description: >
      HTTPS URL of the main product image. Not present in the Nordika source
      catalog — may be omitted for the hackathon.

  availability:
    requirement: required
    type: enum
    values: [in_stock, out_of_stock, preorder, backorder]
    description: >
      Availability status. Derived from stock_quantity:
      - in_stock if stock_quantity > 0
      - out_of_stock if stock_quantity == 0

  price:
    requirement: required
    type: string
    format: "<amount> <ISO_4217_currency>"
    description: >
      Selling price INCLUDING VAT (the customer-facing TTC price).
      Format: amount with two decimals, a space, then the 3-letter
      currency code. Example: "601.44 EUR".
      Must match the currency declared in feed_metadata.feed_locale.

  brand:
    requirement: required
    type: string
    max_length: 70
    description: >
      Brand name. For Nordika Studio: always "Nordika Studio".

  condition:
    requirement: required
    type: enum
    values: [new, refurbished, used]
    description: >
      Item condition. All Nordika products are sold as "new".

  google_product_category:
    requirement: required
    type: string
    localized: true
    description: >
      Google's official product category taxonomy. Must be either the numeric
      category ID (language-agnostic, preferred) or the full localized
      category path. See the Google Shopping taxonomy reference files
      provided with the hackathon kit.
      Example numeric ID: "436"
      Example FR path: "Meubles > Chaises"
      Example DE path: "Möbel > Stühle"

  # ---------------------------------------------------------------------------
  # Recommended attributes (strongly improve search visibility and ad eligibility)
  # ---------------------------------------------------------------------------

  gtin:
    requirement: recommended
    type: string
    pattern: "^[0-9]{8}$|^[0-9]{12,14}$"
    description: >
      Global Trade Item Number (EAN/UPC/ISBN), 8, 12, 13 or 14 digits.
      Strongly recommended when available. Products without a GTIN may
      require `identifier_exists: false` to be accepted.

  mpn:
    requirement: recommended
    type: string
    max_length: 70
    description: >
      Manufacturer Part Number. Typically equals the seller's internal SKU
      for private-label brands.

  color:
    requirement: recommended
    type: string
    max_length: 100
    localized: true
    description: >
      Primary color of the product, in the feed's language.
      Example FR: "Crème", IT: "Crema", DE: "Creme".
      When multiple colors are relevant, separate with "/" (max 3).

  material:
    requirement: recommended
    type: string
    max_length: 200
    localized: true
    description: >
      Primary material(s) of the product, in the feed's language.
      When multiple materials are relevant, separate with "/" (max 3).

  size:
    requirement: conditionally_required
    type: string
    localized: true
    description: >
      Size of the product. Required for apparel and some bedding verticals
      (mattresses, bed frames sold in standard sizes).
      Example for a mattress: "160 x 200 cm".

  product_type:
    requirement: recommended
    type: string
    localized: true
    description: >
      Free-form categorical path used for internal organization and
      reporting. Not to be confused with google_product_category.
      Example: "Meubles > Salon > Canapés".

  shipping:
    requirement: recommended
    type: string
    format: "<country>::<service>:<amount> <currency>"
    description: >
      Shipping cost per country/service combination. Multiple shipping
      entries can be provided (one per line in the TSV, or comma-separated
      in a single cell).
      Example: "FR::Standard:9.90 EUR"

  shipping_weight:
    requirement: recommended
    type: string
    format: "<value> <unit>"
    description: >
      Shipping weight with its unit.
      Allowed units: kg, g, lb, oz.
      Example: "7.0 kg"

  # ---------------------------------------------------------------------------
  # Optional attributes (nice-to-have, useful for filtering and ads quality)
  # ---------------------------------------------------------------------------

  additional_image_link:
    requirement: optional
    type: array
    max_items: 10
    item_type: string
    item_format: url_https
    description: >
      Additional product image URLs (up to 10). Each image must be a valid
      HTTPS URL.

  sale_price:
    requirement: optional
    type: string
    format: "<amount> <ISO_4217_currency>"
    description: >
      Discounted price (including VAT). Must be lower than `price`.
      When provided, displayed as strike-through + promotional price.

  sale_price_effective_date:
    requirement: optional
    type: string
    format: "<ISO_8601_start>/<ISO_8601_end>"
    description: >
      Time window during which sale_price is active.
      Example: "2026-05-01T00:00:00+02:00/2026-05-15T23:59:59+02:00"

  product_highlight:
    requirement: optional
    type: array
    max_items: 10
    item_type: string
    item_max_length: 150
    localized: true
    description: >
      Short bullet points highlighting key product features. In a TSV,
      separate multiple values with a pipe character "|".

  identifier_exists:
    requirement: optional
    type: boolean
    description: >
      Set to false when the product has no GTIN, MPN, or brand identifier.
      Required for products without a GTIN to avoid validation errors.

  age_group:
    requirement: optional
    type: enum
    values: [newborn, infant, toddler, kids, adult]
    description: >
      Target age group. Required for apparel products. Not relevant for
      furniture in most cases (typically "adult" by default).

# -----------------------------------------------------------------------------
# TSV-SPECIFIC CONSTRAINTS
# -----------------------------------------------------------------------------

tsv_encoding:
  file_encoding: UTF-8
  line_ending: "\\n"
  field_separator: "\\t"
  rules:
    - "The first line MUST be a header row listing the column names in the order of the data rows."
    - "Values containing tabs must have the tab removed or replaced with a space."
    - "Values containing line breaks must escape them as literal \\n."
    - "Values containing double quotes must double them (\"\" inside a quoted value)."
    - "Multi-value attributes (e.g. product_highlight) use the pipe character '|' as an intra-cell separator."
