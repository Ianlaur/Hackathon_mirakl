# Amazon Marketplace — Product type specific attributes
# -----------------------------------------------------------------------------
# Ce fichier documente les attributs SPÉCIFIQUES à chaque product_type,
# en complément des common_attributes.
#
# Règles :
#   - specific_attributes : attributs propres à ce product_type uniquement.
#   - Requirement levels : la plupart des specific_attributes sont 'recommended'.
#     Ils améliorent la qualité du listing (ranking, filter facets, conversion)
#     mais ne bloquent pas la validation du feed. Seuls quelques attributs
#     restent 'required' quand l'information est structurante pour la
#     navigation client (ex. TABLE.shape).
#
# Cette liste est un EXTRAIT représentatif de la taxonomie Amazon.
# Elle contient des product_types potentiellement pertinents pour ce hackathon
# -----------------------------------------------------------------------------

version: 1
marketplace: amazon

product_types:


  CHAIR:
    description: >
      General-purpose seating for one person with a backrest.
      Covers dining chairs, accent chairs, armchairs, and similar seating
      that does not fall into a more specific category.
    specific_attributes:
      seat_height:
        requirement: recommended
        type: number
        unit: centimeters
        min: 20
        max: 100
        description: Distance from floor to top of seat.
      max_weight_recommendation:
        requirement: recommended
        type: number
        unit: kilograms
        min: 20
        max: 500
        description: Maximum load the chair can support.
      style:
        requirement: recommended
        type: enum
        localized: true
        values: [Modern, Scandinavian, Industrial, Bohemian, Contemporary, Traditional, Rustic, Mid-century]
      is_assembly_required:
        requirement: optional
        type: boolean

  BEAN_BAG_CHAIR:
    description: >
      Soft, molding seating furniture filled with beads or foam.
      Not for rigid-frame chairs.
    specific_attributes:
      fill_material:
        requirement: recommended
        type: string
        localized: true
        description: Type of filling (EPS beads, memory foam, etc.)
      cover_material:
        requirement: recommended
        type: string
        localized: true
      is_cover_removable:
        requirement: recommended
        type: boolean

  STOOL_SEATING:
    description: >
      Seat without a backrest, typically used at bars, counters or as
      occasional seating. Covers bar stools, counter stools, ottomans
      used as seats.
    specific_attributes:
      seat_height:
        requirement: recommended
        type: number
        unit: centimeters
        min: 20
        max: 120
      swivel:
        requirement: recommended
        type: boolean
      has_backrest:
        requirement: recommended
        type: boolean
      has_footrest:
        requirement: recommended
        type: boolean
      max_weight_recommendation:
        requirement: recommended
        type: number
        unit: kilograms

  STEP_STOOL:
    description: >
      Small stool used to reach high places, typically 1-3 steps.
      NOT for bar stools or seating stools.
    specific_attributes:
      number_of_steps:
        requirement: recommended
        type: integer
        min: 1
        max: 5
      is_foldable:
        requirement: recommended
        type: boolean
      max_weight_recommendation:
        requirement: recommended
        type: number
        unit: kilograms

  OTTOMAN:
    description: >
      Upholstered footstool or low bench without a backrest, used as a
      footrest or extra seating. May include storage.
    specific_attributes:
      has_storage:
        requirement: recommended
        type: boolean
      upholstery_material:
        requirement: recommended
        type: string
        localized: true

  FOOTREST:
    description: >
      Object used to rest feet, typically placed under a desk.
      Not for upholstered ottomans (use OTTOMAN).
    specific_attributes:
      is_height_adjustable:
        requirement: recommended
        type: boolean
      is_tilt_adjustable:
        requirement: recommended
        type: boolean
      surface_material:
        requirement: optional
        type: string
        localized: true


  TABLE:
    description: >
      Surface-top furniture used for eating, working, or displaying items.
      Covers dining tables, coffee tables, side tables, console tables,
      desks when sold as simple surfaces without dedicated workspace features.
    specific_attributes:
      shape:
        requirement: required
        type: enum
        values: [round, rectangular, square, oval, irregular, na]
        description: >
          Structural shape of the table. Required because it's a primary
          facet in marketplace category browse pages.
      number_of_seats:
        requirement: recommended
        type: integer
        min: 1
        max: 20
        description: Recommended number of seated diners.
      is_extendable:
        requirement: recommended
        type: boolean
      top_thickness:
        requirement: optional
        type: number
        unit: millimeters
      table_top_material:
        requirement: recommended
        type: string
        localized: true
      table_base_material:
        requirement: recommended
        type: string
        localized: true

  DESK:
    description: >
      Table specifically designed for work (writing, computer use, study).
      Typically includes features like cable management, drawers, or
      dedicated legroom. Not for simple tables repurposed as desks.
    specific_attributes:
      is_height_adjustable:
        requirement: recommended
        type: boolean
      number_of_drawers:
        requirement: recommended
        type: integer
        min: 0
        max: 10
      has_cable_management:
        requirement: optional
        type: boolean
      work_surface_material:
        requirement: recommended
        type: string
        localized: true

  LAP_DESK:
    description: >
      Portable surface used on one's lap, typically for laptops or reading.
      NOT for standing or freestanding desks.
    specific_attributes:
      has_cushion:
        requirement: recommended
        type: boolean
      compatible_device_size:
        requirement: optional
        type: string
        description: e.g., "Up to 17-inch laptop"

  WORKBENCH:
    description: >
      Heavy-duty table designed for manual work (carpentry, DIY, mechanics).
      Typically includes a vise, heavy wood top, tool storage. NOT office furniture.
    specific_attributes:
      work_surface_material:
        requirement: recommended
        type: string
      max_weight_recommendation:
        requirement: recommended
        type: number
        unit: kilograms
      has_vise:
        requirement: optional
        type: boolean


  SOFA:
    description: >
      Upholstered seating for multiple people with a backrest and armrests.
      Covers straight sofas, sectionals, corner sofas, love seats,
      recliner sofas.
    specific_attributes:
      number_of_seats:
        requirement: recommended
        type: integer
        min: 1
        max: 10
      upholstery_material:
        requirement: recommended
        type: string
        localized: true
      filling_material:
        requirement: recommended
        type: string
        localized: true
      configuration:
        requirement: recommended
        type: enum
        values: [straight, corner_left, corner_right, sectional, modular]
      is_convertible:
        requirement: recommended
        type: boolean
        description: Can be converted into a bed.
      has_recliner:
        requirement: optional
        type: boolean
      has_storage:
        requirement: optional
        type: boolean


  BED:
    description: >
      Complete bed including frame and headboard (sometimes bed base).
      For frame-only products, use BED_FRAME. For mattresses, use MATTRESS.
    specific_attributes:
      mattress_size:
        requirement: recommended
        type: enum
        values: [single_90x190, single_90x200, double_140x190, double_140x200, queen_160x200, king_180x200, super_king_200x200]
      headboard_height:
        requirement: recommended
        type: number
        unit: centimeters
      headboard_material:
        requirement: recommended
        type: string
        localized: true
      includes_bed_base:
        requirement: recommended
        type: boolean
      includes_mattress:
        requirement: recommended
        type: boolean
      has_storage:
        requirement: recommended
        type: boolean

  BED_FRAME:
    description: >
      Structural frame of a bed, without mattress, without headboard.
      For complete beds with headboard, use BED.
    specific_attributes:
      mattress_size:
        requirement: recommended
        type: enum
        values: [single_90x190, single_90x200, double_140x190, double_140x200, queen_160x200, king_180x200, super_king_200x200]
      frame_material:
        requirement: recommended
        type: string
        localized: true
      number_of_slats:
        requirement: recommended
        type: integer

  MATTRESS:
    description: >
      Mattress sold on its own. For complete beds with mattress included,
      use BED. For air mattresses, use AIR_MATTRESS.
    specific_attributes:
      mattress_size:
        requirement: recommended
        type: enum
        values: [single_90x190, single_90x200, double_140x190, double_140x200, queen_160x200, king_180x200, super_king_200x200]
      mattress_thickness:
        requirement: recommended
        type: number
        unit: centimeters
        min: 5
        max: 50
      firmness:
        requirement: recommended
        type: enum
        values: [very_soft, soft, medium_soft, medium, medium_firm, firm, very_firm]
      core_material:
        requirement: recommended
        type: enum
        values: [memory_foam, latex, spring, pocket_spring, hybrid, bonnell_spring, polyurethane_foam]
      cover_material:
        requirement: recommended
        type: string
        localized: true
      is_cover_removable:
        requirement: optional
        type: boolean
      fire_safety_certification:
        requirement: recommended
        type: string
        description: e.g., "BS 7177", "CAL 129"

  AIR_MATTRESS:
    description: >
      Inflatable mattress, typically for temporary or camping use.
      NOT for spring or foam mattresses.
    specific_attributes:
      includes_pump:
        requirement: recommended
        type: boolean
      max_weight_recommendation:
        requirement: recommended
        type: number
        unit: kilograms

  HEADBOARD:
    description: >
      Headboard sold separately, without bed frame.
      For complete beds, use BED.
    specific_attributes:
      mount_type:
        requirement: recommended
        type: enum
        values: [freestanding, wall_mounted, bed_frame_attached]
      upholstery_material:
        requirement: recommended
        type: string
        localized: true


  CABINET:
    description: >
      Enclosed storage furniture with doors and/or drawers, typically for
      dining rooms, living rooms, or hallways. Includes sideboards, buffets,
      credenzas, china cabinets.
    specific_attributes:
      number_of_doors:
        requirement: recommended
        type: integer
        min: 0
        max: 10
      number_of_drawers:
        requirement: recommended
        type: integer
        min: 0
        max: 20
      number_of_shelves:
        requirement: recommended
        type: integer
        min: 0
        max: 20
      are_shelves_adjustable:
        requirement: optional
        type: boolean
      door_opening_system:
        requirement: optional
        type: enum
        values: [standard, push_to_open, soft_close, sliding]

  DRESSER:
    description: >
      Bedroom storage furniture consisting primarily of drawers.
      Includes chests of drawers, tallboys, bureaus. For mixed drawer+door
      bedroom storage, DRESSER still applies.
    specific_attributes:
      number_of_drawers:
        requirement: recommended
        type: integer
        min: 2
        max: 20
      drawer_opening_system:
        requirement: recommended
        type: enum
        values: [standard_pull, integrated_handle, push_to_open]
      drawer_closing_system:
        requirement: recommended
        type: enum
        values: [standard, soft_close]
      has_mirror:
        requirement: optional
        type: boolean

  SHELF:
    description: >
      Open or partially open storage with one or more shelves.
      Includes bookshelves, bookcases, open shelving units, étagères.
      NOT for closed cabinets (use CABINET) or dressers (use DRESSER).
    specific_attributes:
      number_of_shelves:
        requirement: recommended
        type: integer
        min: 1
        max: 20
      are_shelves_adjustable:
        requirement: recommended
        type: boolean
      max_weight_per_shelf:
        requirement: optional
        type: number
        unit: kilograms
      mount_type:
        requirement: recommended
        type: enum
        values: [freestanding, wall_mounted, ladder, corner]

  AV_FURNITURE:
    description: >
      Furniture specifically designed to hold audio/video equipment:
      TV stands, media consoles, entertainment centers, hi-fi racks.
    specific_attributes:
      max_tv_size:
        requirement: recommended
        type: number
        unit: inches
        description: Maximum TV diagonal size this furniture can support.
      max_tv_weight:
        requirement: recommended
        type: number
        unit: kilograms
      number_of_shelves:
        requirement: recommended
        type: integer
      number_of_drawers:
        requirement: optional
        type: integer
      has_cable_management:
        requirement: optional
        type: boolean


  HOME_MIRROR:
    description: >
      Decorative or functional mirrors for the home (wall-mounted, leaning,
      standing). NOT for bathroom vanity mirrors sold with cabinets.
    specific_attributes:
      mirror_shape:
        requirement: recommended
        type: enum
        values: [round, rectangular, square, oval, irregular, arched]
      mount_type:
        requirement: recommended
        type: enum
        values: [wall_mounted, leaning, freestanding, tabletop]
      frame_material:
        requirement: recommended
        type: string
        localized: true
      frame_color:
        requirement: recommended
        type: string
        localized: true


  FURNITURE:
    description: >
      Generic catch-all for furniture items that don't fit other specific
      product_types. Use only when no specific product_type applies.
      Listings in this category have lower visibility in search.
    specific_attributes: {}

  HOME_FURNITURE_AND_DECOR:
    description: >
      Very high-level catch-all for any home furnishing or decor item.
      Only use when no specific product_type applies. Strongly discouraged
      for individual listings; mostly used for bundles or multi-category sets.
    specific_attributes: {}


  LAMP:
    description: >
      Electric lighting fixture, typically placed on a table or floor.
      Covers table lamps, floor lamps, desk lamps.
    specific_attributes:
      lamp_type:
        requirement: recommended
        type: enum
        values: [table, floor, desk, wall_sconce]
      bulb_included:
        requirement: recommended
        type: boolean
      power_source:
        requirement: recommended
        type: enum
        values: [corded_electric, battery, rechargeable, solar]
      max_bulb_wattage:
        requirement: recommended
        type: number
        unit: watts

  PILLOW:
    description: >
      Decorative or functional pillow/cushion. Includes throw pillows,
      seat cushions, bed pillows.
    specific_attributes:
      fill_material:
        requirement: recommended
        type: string
        localized: true
      cover_material:
        requirement: recommended
        type: string
        localized: true
      is_cover_removable:
        requirement: optional
        type: boolean

  RUG:
    description: >
      Floor covering, typically rectangular or round, used to define a space
      or add warmth. Covers area rugs, runners, doormats (decorative).
    specific_attributes:
      rug_shape:
        requirement: recommended
        type: enum
        values: [rectangular, round, oval, runner, irregular]
      pile_height:
        requirement: recommended
        type: number
        unit: millimeters
      pile_material:
        requirement: recommended
        type: string
        localized: true

  BLANKET:
    description: >
      Decorative or functional blanket, throw or coverlet for beds or sofas.
    specific_attributes:
      blanket_material:
        requirement: recommended
        type: string
        localized: true
      washing_instructions:
        requirement: optional
        type: string

  VASE:
    description: Decorative vessel for holding flowers or as an ornament.
    specific_attributes:
      vase_material:
        requirement: recommended
        type: string
        localized: true

  CANDLE_HOLDER:
    description: Stand or container for displaying candles.
    specific_attributes:
      holder_material:
        requirement: recommended
        type: string
      number_of_candles:
        requirement: recommended
        type: integer

  WALL_ART:
    description: >
      Wall-mounted decorative items: paintings, prints, posters, framed art.
      NOT for mirrors (use HOME_MIRROR).
    specific_attributes:
      art_form:
        requirement: recommended
        type: enum
        values: [painting, print, poster, photograph, tapestry, mixed_media]
      is_framed:
        requirement: recommended
        type: boolean

  ARTIFICIAL_PLANT:
    description: Decorative plant made of plastic, silk or other materials, non-living.
    specific_attributes:
      plant_type:
        requirement: recommended
        type: string
      includes_pot:
        requirement: recommended
        type: boolean

  PLANTER:
    description: >
      Container for growing plants, decorative or functional.
      Does not include the plant itself.
    specific_attributes:
      planter_material:
        requirement: recommended
        type: string
      has_drainage_hole:
        requirement: recommended
        type: boolean
      is_outdoor_suitable:
        requirement: recommended
        type: boolean

  CLOCK:
    description: Time-measuring decorative or functional device (wall, mantel, desk).
    specific_attributes:
      clock_type:
        requirement: recommended
        type: enum
        values: [wall, mantel, desk, floor, grandfather]
      movement_type:
        requirement: recommended
        type: enum
        values: [quartz, mechanical, digital, atomic]

  CURTAIN:
    description: Fabric window covering, sold as pairs or single panels.
    specific_attributes:
      curtain_type:
        requirement: recommended
        type: enum
        values: [blackout, sheer, thermal, decorative, rod_pocket, grommet]
      fabric_material:
        requirement: recommended
        type: string
        localized: true
      is_pair:
        requirement: recommended
        type: boolean

  TABLECLOTH:
    description: Cloth cover placed on a table for protection or decoration.
    specific_attributes:
      fabric_material:
        requirement: recommended
        type: string
        localized: true
      is_water_resistant:
        requirement: optional
        type: boolean

  FURNITURE_COVER:
    description: >
      Protective cover for furniture: sofa slipcovers, chair covers,
      outdoor furniture protectors. NOT for furniture itself.
    specific_attributes:
      compatible_furniture_type:
        requirement: recommended
        type: string
      is_waterproof:
        requirement: recommended
        type: boolean


  DINNERWARE:
    description: Plates, bowls and serving dishes for dining.
    specific_attributes:
      number_of_pieces:
        requirement: recommended
        type: integer
      material:
        requirement: recommended
        type: string
      is_dishwasher_safe:
        requirement: recommended
        type: boolean

  CUTLERY:
    description: Knives, forks and spoons for dining.
    specific_attributes:
      number_of_pieces:
        requirement: recommended
        type: integer
      number_of_place_settings:
        requirement: recommended
        type: integer
      material:
        requirement: recommended
        type: string

  DRINKING_CUP:
    description: Cup for drinking beverages — mugs, glasses, tumblers.
    specific_attributes:
      capacity:
        requirement: recommended
        type: number
        unit: milliliters
      material:
        requirement: recommended
        type: string

  DISHWARE_PLATE:
    description: Single plate, not part of a dinnerware set.
    specific_attributes:
      plate_diameter:
        requirement: recommended
        type: number
        unit: centimeters
      material:
        requirement: recommended
        type: string

  COOKING_POT:
    description: Cooking vessel with lid, for use on stovetops.
    specific_attributes:
      capacity:
        requirement: recommended
        type: number
        unit: liters
      material:
        requirement: recommended
        type: string
      includes_lid:
        requirement: recommended
        type: boolean

  KITCHEN_KNIFE:
    description: Knife for food preparation.
    specific_attributes:
      blade_length:
        requirement: recommended
        type: number
        unit: centimeters
      blade_material:
        requirement: recommended
        type: string
      knife_type:
        requirement: recommended
        type: enum
        values: [chef, paring, bread, santoku, utility, boning, carving, cleaver]

  COFFEE_MAKER:
    description: Appliance for brewing coffee.
    specific_attributes:
      machine_type:
        requirement: recommended
        type: enum
        values: [drip, espresso, capsule, french_press, percolator, moka_pot]
      capacity:
        requirement: recommended
        type: number
        unit: cups
      is_programmable:
        requirement: optional
        type: boolean


  REFRIGERATOR:
    description: Household refrigerator or fridge-freezer combination.
    specific_attributes:
      capacity:
        requirement: recommended
        type: number
        unit: liters
      energy_rating:
        requirement: recommended
        type: enum
        values: [A, B, C, D, E, F, G]
      fridge_type:
        requirement: recommended
        type: enum
        values: [top_freezer, bottom_freezer, side_by_side, french_door, mini, under_counter]

  VACUUM_FILTER:
    description: Replacement filter for vacuum cleaners. NOT a vacuum cleaner.
    specific_attributes:
      filter_type:
        requirement: recommended
        type: enum
        values: [HEPA, foam, charcoal, bag, cyclonic]
      compatible_brand:
        requirement: recommended
        type: string

  AIR_FRYER:
    description: Small kitchen appliance that cooks using hot air circulation.
    specific_attributes:
      capacity:
        requirement: recommended
        type: number
        unit: liters
      max_temperature:
        requirement: recommended
        type: number
        unit: celsius
      wattage:
        requirement: recommended
        type: number
        unit: watts

  TELEVISION:
    description: Flat-panel television display.
    specific_attributes:
      screen_size:
        requirement: recommended
        type: number
        unit: inches
      display_technology:
        requirement: recommended
        type: enum
        values: [LED, OLED, QLED, mini-LED, micro-LED, plasma]
      resolution:
        requirement: recommended
        type: enum
        values: [HD, Full HD, 4K UHD, 8K UHD]
      smart_features:
        requirement: recommended
        type: boolean

  HEADPHONES:
    description: Audio listening device worn on or in the ears.
    specific_attributes:
      form_factor:
        requirement: recommended
        type: enum
        values: [over_ear, on_ear, in_ear, earbuds, bone_conduction]
      connection_type:
        requirement: recommended
        type: enum
        values: [wired, wireless_bluetooth, wireless_rf, true_wireless]
      has_noise_cancellation:
        requirement: recommended
        type: boolean

  SPEAKERS:
    description: Audio output device (standalone or paired speakers).
    specific_attributes:
      speaker_type:
        requirement: recommended
        type: enum
        values: [bookshelf, floorstanding, portable, smart, soundbar, subwoofer]
      power_output:
        requirement: recommended
        type: number
        unit: watts
      connection_type:
        requirement: recommended
        type: enum
        values: [wired, wireless_bluetooth, wireless_wifi, multiple]


  BOOK:
    description: Printed or physical book.
    specific_attributes:
      author:
        requirement: recommended
        type: string
      number_of_pages:
        requirement: recommended
        type: integer
      format:
        requirement: recommended
        type: enum
        values: [hardcover, paperback, spiral_bound, board_book]
      language:
        requirement: recommended
        type: string

  SHIRT:
    description: Upper-body garment.
    specific_attributes:
      clothing_size:
        requirement: recommended
        type: string
        description: e.g., XS, S, M, L, XL, XXL, or numeric sizes
      sleeve_length:
        requirement: recommended
        type: enum
        values: [sleeveless, short_sleeve, three_quarter_sleeve, long_sleeve]
      fabric_material:
        requirement: recommended
        type: string

  SHOES:
    description: Footwear sold in pairs.
    specific_attributes:
      shoe_size:
        requirement: recommended
        type: string
      shoe_type:
        requirement: recommended
        type: enum
        values: [sneaker, boot, sandal, heel, flat, loafer, dress_shoe, slipper]
      outer_material:
        requirement: recommended
        type: string
      closure_type:
        requirement: optional
        type: enum
        values: [lace_up, slip_on, velcro, zipper, buckle]
